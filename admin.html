<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 | PAGE STUDIO</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

<!-- ─── 로그인 화면 ──────────────────────────────────────────── -->
<div class="admin-lock" id="adminLock">
  <div class="admin-lock__box">
    <span class="admin-lock__brand">PAGE STUDIO</span>
    <span class="admin-lock__label">관리자 전용 페이지</span>
    <form class="admin-lock__form" id="lockForm" novalidate>
      <input class="admin-lock__input" type="email" id="adminEmail" placeholder="이메일" autocomplete="email" />
      <input class="admin-lock__input" type="password" id="adminPw" placeholder="●●●●●●" autocomplete="current-password" style="margin-top:8px;" />
      <p class="admin-lock__error" id="lockError">이메일 또는 비밀번호가 올바르지 않습니다.</p>
      <button type="submit" class="btn btn--primary" style="width:100%;margin-top:4px;">접속</button>
    </form>
  </div>
</div>

<!-- ─── 관리자 패널 ──────────────────────────────────────────── -->
<div class="admin-panel" id="adminPanel">

  <div class="admin-header">
    <div class="admin-header__brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      PAGE STUDIO
      <span class="admin-header__subtitle">Admin Panel</span>
    </div>
    <button class="admin-header__logout" id="logoutBtn" aria-label="로그아웃">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      로그아웃
    </button>
  </div>

  <div class="admin-tabs" role="tablist">
    <button class="admin-tab active" data-pane="reservations" role="tab" aria-selected="true">예약 관리</button>
    <button class="admin-tab" data-pane="gallery" role="tab" aria-selected="false">갤러리 관리</button>
    <button class="admin-tab" data-pane="faq" role="tab" aria-selected="false">FAQ 관리</button>
    <button class="admin-tab" data-pane="prices" role="tab" aria-selected="false">가격 관리</button>
  </div>

  <div class="admin-content">

    <!-- ─── 예약 관리 ──── -->
    <div class="admin-pane active" id="pane-reservations" role="tabpanel">
      <div class="admin-card">
        <div class="admin-card__title">예약 목록</div>
        <div id="reservationsStats" style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;"></div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>#</th><th>이름</th><th>연락처</th><th>상품</th><th>날짜</th><th>시간</th><th>인원</th><th>상태</th><th>신청일</th><th>삭제</th></tr></thead>
            <tbody id="reservationsTbody"><tr><td colspan="10" style="text-align:center;padding:32px;color:var(--text-muted);">불러오는 중...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ─── 갤러리 관리 ──── -->
    <div class="admin-pane" id="pane-gallery" role="tabpanel">
      <div class="admin-card" style="margin-bottom:24px;">
        <div class="admin-card__title">사진 업로드</div>
        <form id="galleryUploadForm" style="display:grid;gap:12px;">
          <div class="admin-grid-2">
            <div class="admin-field">
              <label class="admin-label">이미지 파일 (복수 선택 가능)</label>
              <input class="admin-input" type="file" id="galleryFile" accept="image/*" multiple required />
            </div>
            <div class="admin-field">
              <label class="admin-label">카테고리</label>
              <select class="admin-input" id="galleryCategory">
                <option value="profile">프로필</option>
                <option value="artist">아티스트</option>
                <option value="group">단체</option>
                <option value="selfbooth">셀프부스</option>
              </select>
            </div>
            <div class="admin-field">
              <label class="admin-label">설명 (alt)</label>
              <input class="admin-input" type="text" id="galleryAlt" placeholder="사진 설명" />
            </div>
            <div class="admin-field">
              <label class="admin-label">순서 번호</label>
              <input class="admin-input" type="number" id="galleryOrder" placeholder="1" min="1" />
            </div>
          </div>
          <div>
            <button type="submit" class="btn btn--primary btn--sm" id="galleryUploadBtn">업로드</button>
            <span id="galleryUploadStatus" style="font-family:var(--font-sans);font-size:0.85rem;margin-left:12px;color:var(--text-muted);"></span>
          </div>
        </form>
      </div>
      <div class="admin-card">
        <div class="admin-card__title">등록된 사진</div>
        <div id="galleryAdminGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;"></div>
      </div>
    </div>

    <!-- ─── FAQ 관리 ──── -->
    <div class="admin-pane" id="pane-faq" role="tabpanel">
      <div class="admin-card" style="margin-bottom:24px;">
        <div class="admin-card__title">FAQ 추가</div>
        <form id="faqForm" style="display:grid;gap:12px;">
          <div class="admin-field">
            <label class="admin-label">질문</label>
            <input class="admin-input" type="text" id="faqQuestion" placeholder="질문을 입력하세요" required />
          </div>
          <div class="admin-field">
            <label class="admin-label">답변</label>
            <textarea class="admin-textarea" id="faqAnswer" placeholder="답변을 입력하세요" required></textarea>
          </div>
          <div class="admin-field">
            <label class="admin-label">순서 번호</label>
            <input class="admin-input" type="number" id="faqOrder" placeholder="1" min="1" style="width:120px;" />
          </div>
          <div><button type="submit" class="btn btn--primary btn--sm">추가</button></div>
        </form>
      </div>
      <div class="admin-card">
        <div class="admin-card__title">FAQ 목록</div>
        <div id="faqList"></div>
      </div>
    </div>

    <!-- ─── 가격 관리 ──── -->
    <div class="admin-pane" id="pane-prices" role="tabpanel">
      <div class="admin-card">
        <div class="admin-card__title">
          가격 목록
          <span style="font-size:0.8rem;font-weight:400;color:var(--text-muted);">— 항목 클릭 시 편집</span>
        </div>
        <div id="pricesAdminList"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
<script src="js/pb.js"></script>
<script src="js/main.js"></script>
<script>
const lock  = document.getElementById('adminLock');
const panel = document.getElementById('adminPanel');

function fmtDate(iso) {
  if (!iso) return '-';
  try { return new Date(iso).toLocaleString('ko-KR', { dateStyle: 'short', timeStyle: 'short' }); }
  catch { return iso; }
}

// ─── 로그인 ──────────────────────────────────────────────────── //
if (pb.authStore.isValid) { showPanel(); }

document.getElementById('lockForm').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('adminEmail').value.trim();
  const pw    = document.getElementById('adminPw').value;
  try {
    await pb.collection('_superusers').authWithPassword(email, pw);
    showPanel();
  } catch {
    document.getElementById('lockError').classList.add('show');
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  pb.authStore.clear();
  location.reload();
});

function showPanel() {
  lock.style.display = 'none';
  panel.classList.add('show');
  initAdmin();
}

// ─── 탭 전환 ─────────────────────────────────────────────────── //
document.querySelectorAll('.admin-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.admin-tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.admin-pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    tab.setAttribute('aria-selected','true');
    document.getElementById('pane-' + tab.dataset.pane)?.classList.add('active');
  });
});

// ─── 관리자 초기화 ────────────────────────────────────────────── //
function initAdmin() {
  loadReservations();
  loadGallery();
  loadFaq();
  loadPrices();
}

// ─── 예약 목록 ───────────────────────────────────────────────── //
async function loadReservations() {
  const tbody = document.getElementById('reservationsTbody');
  const stats = document.getElementById('reservationsStats');
  try {
    const records = await pb.collection('reservations').getFullList({ sort: '-created' });
    const counts = {};
    records.forEach(r => { counts[r.package] = (counts[r.package] || 0) + 1; });
    stats.innerHTML = `
      <div style="background:rgba(247,216,200,0.3);border-radius:4px;padding:10px 18px;text-align:center;">
        <div style="font-family:var(--font-en);font-size:1.4rem;font-weight:600;color:var(--color-primary);">${records.length}</div>
        <div style="font-family:var(--font-sans);font-size:0.75rem;color:var(--text-muted);">총 예약</div>
      </div>
      ${Object.entries(counts).map(([k,v]) => `
        <div style="background:rgba(200,220,235,0.2);border-radius:4px;padding:10px 18px;text-align:center;">
          <div style="font-family:var(--font-en);font-size:1.4rem;font-weight:600;color:var(--color-primary);">${v}</div>
          <div style="font-family:var(--font-sans);font-size:0.75rem;color:var(--text-muted);">${k}</div>
        </div>`).join('')}`;
    if (!records.length) {
      tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--text-muted);">예약 내역이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = records.map((r, i) => `
      <tr>
        <td style="color:var(--text-muted);">${records.length - i}</td>
        <td><strong>${r.name || '-'}</strong></td>
        <td><a href="tel:${r.phone}" style="color:var(--color-primary);">${r.phone || '-'}</a></td>
        <td>${r.package || '-'}</td>
        <td>${r.date || '-'}</td>
        <td>${r.time || '-'}</td>
        <td>${r.people || '-'}</td>
        <td>
          <select class="admin-input" style="padding:4px 8px;font-size:0.8rem;" onchange="updateStatus('reservations','${r.id}',this.value)">
            <option value="new"${r.status==='new'?' selected':''}>신규</option>
            <option value="confirmed"${r.status==='confirmed'?' selected':''}>확정</option>
            <option value="cancelled"${r.status==='cancelled'?' selected':''}>취소</option>
          </select>
        </td>
        <td style="color:var(--text-muted);font-size:0.8rem;">${fmtDate(r.created)}</td>
        <td><button class="btn btn--xs" style="color:#c0392b;border:1px solid rgba(192,57,43,0.3);" onclick="deleteRecord('reservations','${r.id}',loadReservations)">삭제</button></td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--text-muted);">불러오기 실패. PocketBase 연결을 확인하세요.</td></tr>';
  }
}

// ─── 갤러리 ──────────────────────────────────────────────────── //
async function loadGallery() {
  const grid = document.getElementById('galleryAdminGrid');
  try {
    const records = await pb.collection('gallery').getFullList({ sort: 'sort_order' });
    if (!records.length) { grid.innerHTML = '<p style="color:var(--text-muted);font-family:var(--font-sans);font-size:0.9rem;">등록된 사진이 없습니다.</p>'; return; }
    grid.innerHTML = records.map(r => {
      const src = pbFile(r, r.image, '300x300');
      return `
        <div style="position:relative;border-radius:6px;overflow:hidden;aspect-ratio:1;background:#eee;">
          <img src="${src}" alt="${r.alt||''}" style="width:100%;height:100%;object-fit:cover;" loading="lazy" />
          <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);padding:6px 8px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-family:var(--font-sans);font-size:0.7rem;color:#fff;">${r.category||''}</span>
            <button class="btn btn--xs" style="color:#fff;border:1px solid rgba(255,255,255,0.5);padding:2px 8px;font-size:0.7rem;" onclick="deleteRecord('gallery','${r.id}',loadGallery)">삭제</button>
          </div>
        </div>`;
    }).join('');
  } catch { grid.innerHTML = '<p style="color:var(--text-muted);font-family:var(--font-sans);font-size:0.9rem;">불러오기 실패.</p>'; }
}

document.getElementById('galleryUploadForm').addEventListener('submit', async e => {
  e.preventDefault();
  const files    = document.getElementById('galleryFile').files;
  const category = document.getElementById('galleryCategory').value;
  const alt      = document.getElementById('galleryAlt').value;
  const order    = parseInt(document.getElementById('galleryOrder').value) || 99;
  const btn      = document.getElementById('galleryUploadBtn');
  const status   = document.getElementById('galleryUploadStatus');
  if (!files.length) return;
  btn.disabled = true;
  status.textContent = '업로드 중...';
  try {
    for (let i = 0; i < files.length; i++) {
      const fd = new FormData();
      fd.append('image', files[i]);
      fd.append('alt', alt || files[i].name);
      fd.append('category', category);
      fd.append('sort_order', order + i);
      await pb.collection('gallery').create(fd);
      status.textContent = `(${i+1}/${files.length}) 업로드 중...`;
    }
    status.textContent = '완료!';
    e.target.reset();
    loadGallery();
  } catch(err) {
    status.textContent = '오류: ' + (err.message || '업로드 실패');
  } finally { btn.disabled = false; }
});

// ─── FAQ ─────────────────────────────────────────────────────── //
async function loadFaq() {
  const list = document.getElementById('faqList');
  try {
    const records = await pb.collection('faq').getFullList({ sort: 'sort_order' });
    if (!records.length) { list.innerHTML = '<p style="color:var(--text-muted);font-family:var(--font-sans);font-size:0.9rem;">등록된 FAQ가 없습니다.</p>'; return; }
    list.innerHTML = records.map((r, i) => `
      <div style="border:1px solid rgba(234,201,183,0.4);border-radius:6px;padding:16px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
          <div style="flex:1;">
            <p style="font-family:var(--font-sans);font-size:0.9rem;font-weight:600;color:var(--text-primary);margin-bottom:6px;">${i+1}. ${r.question}</p>
            <p style="font-family:var(--font-serif);font-size:0.875rem;color:var(--text-muted);line-height:1.6;">${r.answer}</p>
          </div>
          <button class="btn btn--xs" style="color:#c0392b;border:1px solid rgba(192,57,43,0.3);flex-shrink:0;" onclick="deleteRecord('faq','${r.id}',loadFaq)">삭제</button>
        </div>
      </div>`).join('');
  } catch { list.innerHTML = '<p style="color:var(--text-muted);font-family:var(--font-sans);">불러오기 실패.</p>'; }
}

document.getElementById('faqForm').addEventListener('submit', async e => {
  e.preventDefault();
  const q = document.getElementById('faqQuestion').value.trim();
  const a = document.getElementById('faqAnswer').value.trim();
  const o = parseInt(document.getElementById('faqOrder').value) || 99;
  if (!q || !a) return;
  try {
    await pb.collection('faq').create({ question: q, answer: a, sort_order: o });
    e.target.reset();
    loadFaq();
  } catch(err) { alert('저장 실패: ' + (err.message || '')); }
});

// ─── 가격 목록 ───────────────────────────────────────────────── //
async function loadPrices() {
  const wrap = document.getElementById('pricesAdminList');
  try {
    const records = await pb.collection('prices').getFullList({ sort: 'sort_order' });
    if (!records.length) { wrap.innerHTML = '<p style="color:var(--text-muted);font-family:var(--font-sans);">등록된 가격이 없습니다. PocketBase prices 컬렉션에 직접 추가하세요.</p>'; return; }
    wrap.innerHTML = `
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>상품명</th><th>가격</th><th>시간</th><th>보정</th><th>인기</th><th>순서</th></tr></thead>
          <tbody>${records.map(p => `
            <tr>
              <td><strong>${p.name}</strong></td>
              <td>${p.price}원~</td>
              <td>${p.duration}</td>
              <td>${p.retouched}</td>
              <td>${p.featured ? '⭐' : '-'}</td>
              <td>${p.sort_order || '-'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <p style="font-family:var(--font-sans);font-size:0.8rem;color:var(--text-muted);margin-top:12px;">가격 수정은 PocketBase 대시보드(http://192.168.219.47:8090/_/)에서 직접 편집하세요.</p>`;
  } catch { wrap.innerHTML = '<p style="color:var(--text-muted);font-family:var(--font-sans);">불러오기 실패.</p>'; }
}

// ─── 공통 헬퍼 ───────────────────────────────────────────────── //
window.deleteRecord = async function(collection, id, reloadFn) {
  if (!confirm('삭제하시겠습니까?')) return;
  try {
    await pb.collection(collection).delete(id);
    reloadFn();
  } catch(err) { alert('삭제 실패: ' + (err.message || '')); }
};

window.updateStatus = async function(collection, id, status) {
  try { await pb.collection(collection).update(id, { status }); }
  catch(err) { alert('상태 변경 실패: ' + (err.message || '')); }
};
</script>
<style>
  .admin-table td {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(234, 201, 183, 0.35);
    color: var(--text-body);
    font-family: var(--font-sans);
    font-size: 0.875rem;
    vertical-align: middle;
  }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background-color: rgba(240,239,234,0.5); }
  @media (max-width: 768px) {
    .admin-header { padding: 14px 20px; }
    .admin-content { padding: 24px 16px; }
    .admin-card { padding: 20px 16px; }
    .admin-grid-2 { grid-template-columns: 1fr !important; }
  }
</style>
</body>
</html>
