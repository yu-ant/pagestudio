<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 | PAGE STUDIO</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

<!-- ─── 비밀번호 잠금 ────────────────────────────────────────── -->
<div class="admin-lock" id="adminLock">
  <div class="admin-lock__box">
    <span class="admin-lock__brand">PAGE STUDIO</span>
    <span class="admin-lock__label">관리자 전용 페이지</span>
    <form class="admin-lock__form" id="lockForm" novalidate>
      <input class="admin-lock__input" type="password" id="adminPw" placeholder="●●●●●●" autocomplete="current-password" />
      <p class="admin-lock__error" id="lockError">비밀번호가 올바르지 않습니다.</p>
      <button type="submit" class="btn btn--primary" style="width:100%;">접속</button>
    </form>
  </div>
</div>

<!-- ─── 관리자 패널 ──────────────────────────────────────────── -->
<div class="admin-panel" id="adminPanel">

  <!-- 헤더 -->
  <div class="admin-header">
    <div class="admin-header__brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      PAGE STUDIO
      <span class="admin-header__subtitle">Admin Panel</span>
    </div>
    <button class="admin-header__logout" id="logoutBtn" aria-label="로그아웃">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      로그아웃
    </button>
  </div>

  <!-- 탭 -->
  <div class="admin-tabs" role="tablist">
    <button class="admin-tab active" data-pane="reservations" role="tab" aria-selected="true">예약 관리</button>
    <button class="admin-tab" data-pane="contacts" role="tab" aria-selected="false">문의 내역</button>
    <button class="admin-tab" data-pane="site" role="tab" aria-selected="false">사이트 정보</button>
    <button class="admin-tab" data-pane="prices" role="tab" aria-selected="false">가격 관리</button>
  </div>

  <!-- 콘텐츠 -->
  <div class="admin-content">

    <!-- ─── 예약 관리 탭 ──── -->
    <div class="admin-pane active" id="pane-reservations" role="tabpanel">
      <div class="admin-card">
        <div class="admin-card__title">
          예약 목록
          <button class="btn btn--xs btn--outline" id="clearReservations">전체 삭제</button>
        </div>
        <div id="reservationsStats" style="display:flex;gap:24px;margin-bottom:24px;flex-wrap:wrap;"></div>
        <div class="admin-table-wrap">
          <table class="admin-table" id="reservationsTable">
            <thead>
              <tr>
                <th>#</th>
                <th>이름</th>
                <th>연락처</th>
                <th>상품</th>
                <th>날짜</th>
                <th>시간</th>
                <th>인원</th>
                <th>신청일</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody id="reservationsTbody">
              <tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-muted);">예약 내역이 없습니다.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ─── 문의 내역 탭 ──── -->
    <div class="admin-pane" id="pane-contacts" role="tabpanel">
      <div class="admin-card">
        <div class="admin-card__title">
          문의 목록
          <button class="btn btn--xs btn--outline" id="clearContacts">전체 삭제</button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table" id="contactsTable">
            <thead>
              <tr>
                <th>#</th>
                <th>이름</th>
                <th>연락처</th>
                <th>유형</th>
                <th>내용</th>
                <th>접수일</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody id="contactsTbody">
              <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted);">문의 내역이 없습니다.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ─── 사이트 정보 탭 ──── -->
    <div class="admin-pane" id="pane-site" role="tabpanel">
      <div class="admin-card">
        <div class="admin-card__title">기본 정보</div>
        <div id="siteFormWrap">
          <!-- JS로 렌더링 -->
          <p style="color:var(--text-muted);font-family:var(--font-sans);font-size:0.9rem;">불러오는 중...</p>
        </div>
        <p style="font-family:var(--font-sans);font-size:0.8125rem;color:var(--text-muted);margin-top:16px;">
          ⚠ 이 페이지의 저장 기능은 로컬 미리보기 용도입니다. 실제 운영 시 서버 API 연동이 필요합니다.
        </p>
      </div>
    </div>

    <!-- ─── 가격 관리 탭 ──── -->
    <div class="admin-pane" id="pane-prices" role="tabpanel">
      <div class="admin-card">
        <div class="admin-card__title">가격 목록</div>
        <div id="pricesAdminWrap">
          <p style="color:var(--text-muted);font-family:var(--font-sans);font-size:0.9rem;">불러오는 중...</p>
        </div>
        <p style="font-family:var(--font-sans);font-size:0.8125rem;color:var(--text-muted);margin-top:16px;">
          ⚠ 가격 수정은 <code>data/prices.json</code> 파일을 직접 편집하세요.
        </p>
      </div>
    </div>

  </div><!-- /admin-content -->
</div><!-- /admin-panel -->

<script src="js/main.js"></script>
<script>
  // ─── 비밀번호 ────────────────────────────────────────────── //
  const ADMIN_PW = '1234'; // 실제 배포 시 변경하세요
  const lock = document.getElementById('adminLock');
  const panel = document.getElementById('adminPanel');
  const lockForm = document.getElementById('lockForm');
  const lockError = document.getElementById('lockError');

  // 이미 로그인 상태 확인
  if (sessionStorage.getItem('ps_admin') === '1') {
    lock.style.display = 'none';
    panel.classList.add('show');
    initAdmin();
  }

  lockForm.addEventListener('submit', e => {
    e.preventDefault();
    const pw = document.getElementById('adminPw').value;
    if (pw === ADMIN_PW) {
      sessionStorage.setItem('ps_admin', '1');
      lock.style.display = 'none';
      panel.classList.add('show');
      initAdmin();
    } else {
      lockError.classList.add('show');
      document.getElementById('adminPw').value = '';
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('ps_admin');
    location.reload();
  });

  // ─── 탭 전환 ─────────────────────────────────────────────── //
  document.querySelectorAll('.admin-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.admin-tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
      document.querySelectorAll('.admin-pane').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      document.getElementById(`pane-${tab.dataset.pane}`)?.classList.add('active');
    });
  });

  // ─── 관리자 기능 초기화 ──────────────────────────────────── //
  function initAdmin() {
    renderReservations();
    renderContacts();
    renderSiteInfo();
    renderPricesAdmin();
  }

  // 날짜 포맷
  function fmtDate(iso) {
    if (!iso) return '-';
    try { return new Date(iso).toLocaleString('ko-KR', { dateStyle: 'short', timeStyle: 'short' }); }
    catch { return iso; }
  }

  // ─── 예약 목록 ───────────────────────────────────────────── //
  function renderReservations() {
    const data = JSON.parse(localStorage.getItem('ps_reservations') || '[]');
    const tbody = document.getElementById('reservationsTbody');
    const stats = document.getElementById('reservationsStats');

    // 통계
    const packages = {};
    data.forEach(r => { packages[r.package] = (packages[r.package] || 0) + 1; });
    stats.innerHTML = `
      <div style="background:rgba(247,216,200,0.3);border-radius:4px;padding:12px 20px;text-align:center;">
        <div style="font-family:var(--font-en);font-size:1.5rem;font-weight:600;color:var(--color-primary);">${data.length}</div>
        <div style="font-family:var(--font-sans);font-size:0.75rem;color:var(--text-muted);">총 예약</div>
      </div>
      ${Object.entries(packages).map(([k, v]) => `
        <div style="background:rgba(200,220,235,0.2);border-radius:4px;padding:12px 20px;text-align:center;">
          <div style="font-family:var(--font-en);font-size:1.5rem;font-weight:600;color:var(--color-primary);">${v}</div>
          <div style="font-family:var(--font-sans);font-size:0.75rem;color:var(--text-muted);">${k}</div>
        </div>
      `).join('')}
    `;

    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-muted);">예약 내역이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = [...data].reverse().map((r, i) => `
      <tr>
        <td style="color:var(--text-muted);">${data.length - i}</td>
        <td><strong>${r.name || '-'}</strong></td>
        <td><a href="tel:${r.phone}" style="color:var(--color-primary);">${r.phone || '-'}</a></td>
        <td>${r.package || '-'}</td>
        <td>${r.date || '-'}</td>
        <td>${r.time || '-'}</td>
        <td>${r.people || '-'}</td>
        <td style="color:var(--text-muted);font-size:0.8rem;">${fmtDate(r.submittedAt)}</td>
        <td><button class="btn btn--xs" style="color:#c0392b;border:1px solid rgba(192,57,43,0.3);" onclick="deleteReservation(${r.id})">삭제</button></td>
      </tr>
    `).join('');
  }

  window.deleteReservation = function(id) {
    if (!confirm('이 예약을 삭제하시겠습니까?')) return;
    const data = JSON.parse(localStorage.getItem('ps_reservations') || '[]').filter(r => r.id !== id);
    localStorage.setItem('ps_reservations', JSON.stringify(data));
    renderReservations();
  };

  document.getElementById('clearReservations').addEventListener('click', () => {
    if (!confirm('모든 예약 내역을 삭제하시겠습니까?')) return;
    localStorage.removeItem('ps_reservations');
    renderReservations();
  });

  // ─── 문의 목록 ───────────────────────────────────────────── //
  function renderContacts() {
    const data = JSON.parse(localStorage.getItem('ps_contacts') || '[]');
    const tbody = document.getElementById('contactsTbody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted);">문의 내역이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = [...data].reverse().map((r, i) => `
      <tr>
        <td style="color:var(--text-muted);">${data.length - i}</td>
        <td><strong>${r.name || '-'}</strong></td>
        <td><a href="tel:${r.phone}" style="color:var(--color-primary);">${r.phone || '-'}</a></td>
        <td>${r.subject || '-'}</td>
        <td style="max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.message || '-'}</td>
        <td style="color:var(--text-muted);font-size:0.8rem;">${fmtDate(r.submittedAt)}</td>
        <td><button class="btn btn--xs" style="color:#c0392b;border:1px solid rgba(192,57,43,0.3);" onclick="deleteContact(${r.id})">삭제</button></td>
      </tr>
    `).join('');
  }

  window.deleteContact = function(id) {
    if (!confirm('이 문의를 삭제하시겠습니까?')) return;
    const data = JSON.parse(localStorage.getItem('ps_contacts') || '[]').filter(r => r.id !== id);
    localStorage.setItem('ps_contacts', JSON.stringify(data));
    renderContacts();
  };

  document.getElementById('clearContacts').addEventListener('click', () => {
    if (!confirm('모든 문의 내역을 삭제하시겠습니까?')) return;
    localStorage.removeItem('ps_contacts');
    renderContacts();
  });

  // ─── 사이트 정보 ─────────────────────────────────────────── //
  function renderSiteInfo() {
    fetch('data/site.json')
      .then(r => r.json())
      .then(data => {
        const wrap = document.getElementById('siteFormWrap');
        wrap.innerHTML = `
          <div class="admin-grid-2">
            <div class="admin-field">
              <label class="admin-label">브랜드명 (한국어)</label>
              <input class="admin-input" type="text" value="${data.brand.name_ko}" readonly />
            </div>
            <div class="admin-field">
              <label class="admin-label">브랜드명 (영어)</label>
              <input class="admin-input" type="text" value="${data.brand.name_en}" readonly />
            </div>
            <div class="admin-field" style="grid-column:1/-1;">
              <label class="admin-label">슬로건</label>
              <input class="admin-input" type="text" value="${data.brand.slogan}" readonly />
            </div>
            <div class="admin-field" style="grid-column:1/-1;">
              <label class="admin-label">미션</label>
              <textarea class="admin-textarea" readonly>${data.brand.mission}</textarea>
            </div>
            <div class="admin-field">
              <label class="admin-label">주소</label>
              <input class="admin-input" type="text" value="${data.contact.address}" readonly />
            </div>
            <div class="admin-field">
              <label class="admin-label">전화번호</label>
              <input class="admin-input" type="text" value="${data.contact.phone}" readonly />
            </div>
            <div class="admin-field">
              <label class="admin-label">운영시간</label>
              <input class="admin-input" type="text" value="${data.contact.hours}" readonly />
            </div>
          </div>
          <p style="font-family:var(--font-sans);font-size:0.8rem;color:var(--text-muted);margin-top:12px;">수정은 <code>data/site.json</code> 파일을 직접 편집하세요.</p>
        `;
      })
      .catch(() => {
        document.getElementById('siteFormWrap').innerHTML = '<p style="color:var(--text-muted);">데이터를 불러올 수 없습니다.</p>';
      });
  }

  // ─── 가격 관리 ───────────────────────────────────────────── //
  function renderPricesAdmin() {
    fetch('data/prices.json')
      .then(r => r.json())
      .then(items => {
        const wrap = document.getElementById('pricesAdminWrap');
        wrap.innerHTML = `
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>상품명</th>
                  <th>가격</th>
                  <th>시간</th>
                  <th>보정 컷</th>
                  <th>전달 방식</th>
                  <th>인기 상품</th>
                </tr>
              </thead>
              <tbody>
                ${items.sort((a,b) => a.order - b.order).map(p => `
                  <tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.price}원~</td>
                    <td>${p.duration}</td>
                    <td>${p.retouched}</td>
                    <td style="font-size:0.8rem;">${p.delivery}</td>
                    <td>${p.featured ? '⭐ 인기' : '-'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      })
      .catch(() => {
        document.getElementById('pricesAdminWrap').innerHTML = '<p style="color:var(--text-muted);">데이터를 불러올 수 없습니다.</p>';
      });
  }
</script>
<style>
  .admin-table td {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(234, 201, 183, 0.35);
    color: var(--text-body);
    font-family: var(--font-sans);
    font-size: 0.875rem;
    vertical-align: middle;
  }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background-color: rgba(240,239,234,0.5); }
  @media (max-width: 768px) {
    .admin-header { padding: 14px 20px; }
    .admin-content { padding: 24px 16px; }
    .admin-card { padding: 20px 16px; }
    .admin-grid-2 { grid-template-columns: 1fr !important; }
  }
</style>
</body>
</html>
